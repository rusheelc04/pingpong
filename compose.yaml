# Full stack: app server + MongoDB. Use `docker compose up --build` to start everything.
services:
  app:
    build: .
    container_name: ping-pong-arena-app
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      MONGO_URI: mongodb://mongo:27017/ping-pong-arena
      SESSION_SECRET: ${SESSION_SECRET:?Set SESSION_SECRET in .env}
      CLIENT_URL: ${CLIENT_URL:-http://localhost:3001}
      NODE_ENV: production
      PORT: "3001"
    depends_on:
      mongo:
        condition: service_healthy

  mongo:
    image: mongo:7
    container_name: ping-pong-arena-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test:
        ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand({ ping: 1 })"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  mongo-data:
